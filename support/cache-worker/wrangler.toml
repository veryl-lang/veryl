# Read-only anonymous gateway to the veryl-sccache R2 cache. See README.md.
name = "veryl-sccache"
main = "src/index.js"
compatibility_date = "2025-09-01"
account_id = "bf32e0f339117d1f553c679bdae03214"
workers_dev = true

# Binding is read/write capable; read-only is enforced in src/index.js.
[[r2_buckets]]
binding = "CACHE"
bucket_name = "veryl-sccache"
