name: Deploy

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'

jobs:
  std:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: "${{ runner.os }}-release"
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Setup veryl
        run:  cargo build --profile release-verylup
      - name: Build doc
        run: ../../../target/release-verylup/veryl doc
        working-directory: crates/std/veryl
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: std
          path: crates/std/veryl/target/doc/

  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [std]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download std
        uses: actions/download-artifact@v4
        with:
          name: std
          path: public
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cname: std.veryl-lang.org

  deploy-nightly:
    if: ${{ ! startsWith(github.ref, 'refs/tags/v') }}
    needs: [std]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Download std
        uses: actions/download-artifact@v4
        with:
          name: std
          path: public
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          cname: std.veryl-lang.org
          destination_dir: nightly
