name: CodSpeed

on:
  push:
    branches:
      - "master"
  pull_request:
  # `workflow_dispatch` allows CodSpeed to trigger backtest
  # performance analysis in order to generate initial data.
  workflow_dispatch:

jobs:
  benchmarks:
    strategy:
      fail-fast: false
      matrix:
        package: [veryl-tests, veryl-simulator]

    name: Run benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup rust toolchain, cache and cargo-codspeed binary
        uses: moonrepo/setup-rust@v1
        with:
          channel: stable
          cache: false
          bins: cargo-codspeed

      - uses: ./.github/actions/setup-sccache
        with:
          rw_key_id: ${{ secrets.R2_CACHE_ACCESS_KEY_ID }}
          rw_secret: ${{ secrets.R2_CACHE_SECRET_ACCESS_KEY }}
          ro_key_id: ${{ secrets.R2_CACHE_RO_ACCESS_KEY_ID }}
          ro_secret: ${{ secrets.R2_CACHE_RO_SECRET_ACCESS_KEY }}
          s3_endpoint: ${{ secrets.R2_CACHE_S3_ENDPOINT }}
          bucket: ${{ secrets.R2_CACHE_BUCKET }}

      - name: Build the benchmark target(s)
        run: cargo codspeed build -p ${{ matrix.package }} --bench benchmark

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          run: cargo codspeed run -p ${{ matrix.package }}
          mode: "simulation"
          token: ${{ secrets.CODSPEED_TOKEN }}

  # heliodor 1-core Linux boot benchmark (CodSpeed walltime).
