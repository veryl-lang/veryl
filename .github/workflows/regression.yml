name: Regression

on:
  push:
    branches:
      - master
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rust: stable
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            rust: stable
            target: aarch64-unknown-linux-gnu
          - os: macOS-latest
            rust: stable
            target: aarch64-apple-darwin
          - os: windows-latest
            rust: stable
            target: x86_64-pc-windows-msvc
          - os: windows-11-arm
            rust: stable
            target: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ matrix.rust }}
          targets: ${{ matrix.target }}
      # Windows: sccache can't skip the final link and oversubscription doesn't
      # help (link/proc-macro bound), so a warm rust-cache that restores the whole
      # target/ is far faster here. Only the 2 Windows variants stay on the GHA
      # cache (~3.4GB), which fits the 10GB cap now that everything else is on
      # sccache/R2. Master saves; PRs (incl. forks) restore read-only.
      - uses: Swatinem/rust-cache@v2
        if: runner.os == 'Windows'
        with:
          shared-key: ${{ matrix.target }}
          save-if: ${{ github.ref == 'refs/heads/master' }}
      # Everything else: sccache (codegen cache on R2) + oversubscription.
      - uses: ./.github/actions/setup-sccache
        if: runner.os != 'Windows'
        with:
          rw_key_id: ${{ secrets.R2_CACHE_ACCESS_KEY_ID }}
          rw_secret: ${{ secrets.R2_CACHE_SECRET_ACCESS_KEY }}
          ro_key_id: ${{ secrets.R2_CACHE_RO_ACCESS_KEY_ID }}
          ro_secret: ${{ secrets.R2_CACHE_RO_SECRET_ACCESS_KEY }}
          s3_endpoint: ${{ secrets.R2_CACHE_S3_ENDPOINT }}
          bucket: ${{ secrets.R2_CACHE_BUCKET }}
      # Windows: native shell (pwsh), warm rust-cache restores target/ so there is
      # nothing to oversubscribe. Kept separate so Windows is not run under bash.
      - name: Run tests
        if: runner.os == 'Windows'
        run: cargo test --locked --target ${{ matrix.target }}
      # sccache jobs (non-Windows): the cache is hit-heavy on PRs and each hit is
      # IO-bound (network fetch of the cached object), so oversubscribe cargo jobs
      # (4x cores, the sweep knee) to overlap the fetches instead of serializing on
      # the few runner cores. Skipped on master push (cold populate = real compiles,
      # OOM risk).
      - name: Run tests
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [ "$GITHUB_REF" != "refs/heads/master" ] || [ "$GITHUB_EVENT_NAME" != "push" ]; then
            if command -v nproc >/dev/null 2>&1; then CORES=$(nproc); else CORES=$(sysctl -n hw.logicalcpu 2>/dev/null || echo 4); fi
            export CARGO_BUILD_JOBS=$((CORES * 4))
          fi
          cargo test --locked --target ${{ matrix.target }}

  gen_sv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: ./.github/actions/setup-sccache
        with:
          rw_key_id: ${{ secrets.R2_CACHE_ACCESS_KEY_ID }}
          rw_secret: ${{ secrets.R2_CACHE_SECRET_ACCESS_KEY }}
          ro_key_id: ${{ secrets.R2_CACHE_RO_ACCESS_KEY_ID }}
          ro_secret: ${{ secrets.R2_CACHE_RO_SECRET_ACCESS_KEY }}
          s3_endpoint: ${{ secrets.R2_CACHE_S3_ENDPOINT }}
          bucket: ${{ secrets.R2_CACHE_BUCKET }}
      - name: Run gen_sv
        run: make gen_sv
      - name: Check gen_sv
        run: git diff --exit-code

  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Run rustfmt
        run: cargo fmt -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: ./.github/actions/setup-sccache
        with:
          rw_key_id: ${{ secrets.R2_CACHE_ACCESS_KEY_ID }}
          rw_secret: ${{ secrets.R2_CACHE_SECRET_ACCESS_KEY }}
          ro_key_id: ${{ secrets.R2_CACHE_RO_ACCESS_KEY_ID }}
          ro_secret: ${{ secrets.R2_CACHE_RO_SECRET_ACCESS_KEY }}
          s3_endpoint: ${{ secrets.R2_CACHE_S3_ENDPOINT }}
          bucket: ${{ secrets.R2_CACHE_BUCKET }}
      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

  # Build the release-verylup veryl binary once and share it via an artifact;
  # std / heliodor / cocotb consume it instead of each rebuilding (less redundant
  # compile + fewer heavy jobs competing for runners).
  build-veryl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: ./.github/actions/setup-sccache
        with:
          rw_key_id: ${{ secrets.R2_CACHE_ACCESS_KEY_ID }}
          rw_secret: ${{ secrets.R2_CACHE_SECRET_ACCESS_KEY }}
          ro_key_id: ${{ secrets.R2_CACHE_RO_ACCESS_KEY_ID }}
          ro_secret: ${{ secrets.R2_CACHE_RO_SECRET_ACCESS_KEY }}
          s3_endpoint: ${{ secrets.R2_CACHE_S3_ENDPOINT }}
          bucket: ${{ secrets.R2_CACHE_BUCKET }}
      - name: Build veryl
        run: cargo build --profile release-verylup --bin veryl
      - uses: actions/upload-artifact@v4
        with:
          name: veryl-release-verylup
          path: target/release-verylup/veryl
          retention-days: 1

  std:
    needs: build-veryl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: veryl-release-verylup
          path: target/release-verylup
      - run: chmod +x target/release-verylup/veryl
      - name: Setup verilator
        uses: veryl-lang/setup-verilator@v2
      - name: Format check
        run: ../../../target/release-verylup/veryl fmt --check
        working-directory: crates/std/veryl
      - name: Build check
        run: ../../../target/release-verylup/veryl check
        working-directory: crates/std/veryl
      - name: Test
        run: ../../../target/release-verylup/veryl test --sim verilator
        working-directory: crates/std/veryl

  heliodor:
    needs: build-veryl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/download-artifact@v4
        with:
          name: veryl-release-verylup
          path: target/release-verylup
      - run: chmod +x target/release-verylup/veryl
      - name: Test
        run: ../../target/release-verylup/veryl test
        working-directory: testcases/heliodor
      # The single-hart SoC Linux boot is #[ignore] (long); run it explicitly. It
      # runs on the built-in cc-backend simulator (~30s, not verilator).
      - name: Test Linux boot
        run: ../../target/release-verylup/veryl test --ignored --test test_soc_linux_boot
        working-directory: testcases/heliodor

  cocotb:
    needs: build-veryl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v4
        with:
          name: veryl-release-verylup
          path: target/release-verylup
      - run: chmod +x target/release-verylup/veryl
      - name: Setup verilator
        uses: veryl-lang/setup-verilator@v2
      - name: Test cocotb 1.9.2
        run: |
          pip install "cocotb==1.9.2"
          target/release-verylup/veryl test --sim verilator testcases/veryl/67_cocotb.veryl
      - name: Test cocotb 2.0.0
        run: |
          pip install "cocotb==2.0.0"
          target/release-verylup/veryl test --sim verilator testcases/veryl/67_cocotb.veryl

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: "${{ runner.os }}-wasm"
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Build for wasm
        run: cargo check --target wasm32-unknown-unknown -p veryl-emitter -p veryl-formatter -p veryl-simulator

  highlightgen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'true'
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        continue-on-error: true
        with:
          shared-key: "${{ runner.os }}-highlightgen"
          save-if: ${{ github.ref == 'refs/heads/master' }}
      - name: Run highlightgen
        run: cargo run --bin highlightgen -- check
